{{- range list "auth" "restaurant" "order" }}
{{- $svc := . }}
{{- $dbName := printf "%s_db" $svc }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-{{ $svc }}
  labels:
    app: db-{{ $svc }}
spec:
  serviceName: db-{{ $svc }}
  replicas: 1
  selector:
    matchLabels:
      app: db-{{ $svc }}
  template:
    metadata:
      labels:
        app: db-{{ $svc }}
    spec:
      containers:
        - name: postgres
          image: {{ $.Values.postgres.image }}
          env:
            - name: POSTGRES_USER
              value: {{ $.Values.postgres.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            - name: POSTGRES_DB
              value: {{ $dbName }}
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ $.Values.postgres.user | quote }}, "-d", {{ $dbName | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ $.Values.postgres.storage }}
{{- end }}
