name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  title-check:
    name: PR title format
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            test
            docs
            chore
            ci

  size-check:
    name: PR size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check PR size
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
          echo "Files changed: $CHANGED"
          if [ "$CHANGED" -gt 50 ]; then
            echo "::warning::Large PR — $CHANGED files changed. Consider splitting."
          fi
