name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [monolith, auth-service, restaurant-service, order-service, payment-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.8.4

      - name: Run ruff
        working-directory: services/${{ matrix.service }}
        run: ruff check app/ --ignore E712 || true  # E712 — SQLAlchemy boolean comparisons

  # ── Tests ─────────────────────────────────────────────────────────────────────
  test-monolith:
    name: Test monolith
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/monolith/requirements-dev.txt

      - name: Install dependencies
        working-directory: services/monolith
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: services/monolith
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: test-secret-key
        run: pytest tests/ -v --tb=short

  test-auth-service:
    name: Test auth-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/auth-service/requirements-dev.txt

      - name: Install dependencies
        working-directory: services/auth-service
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: services/auth-service
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: test-secret-key
        run: pytest tests/ -v --tb=short

  test-restaurant-service:
    name: Test restaurant-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/restaurant-service/requirements-dev.txt

      - name: Install dependencies
        working-directory: services/restaurant-service
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: services/restaurant-service
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: test-secret-key
        run: pytest tests/ -v --tb=short

  test-order-service:
    name: Test order-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/order-service/requirements-dev.txt

      - name: Install dependencies
        working-directory: services/order-service
        run: pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: services/order-service
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: test-secret-key
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          RESTAURANT_SERVICE_URL: http://localhost:8002
        run: pytest tests/ -v --tb=short

  # ── Gate — все тесты должны пройти перед CD ──────────────────────────────────
  all-tests-passed:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: [test-monolith, test-auth-service, test-restaurant-service, test-order-service]
    steps:
      - run: echo "All tests passed ✓"
