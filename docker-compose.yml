services:

  # ── Databases ────────────────────────────────────────────────────────────────

  db-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow
      POSTGRES_DB: auth_db
    volumes:
      - db_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodflow -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-restaurant:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow
      POSTGRES_DB: restaurant_db
    volumes:
      - db_restaurant_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodflow -d restaurant_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-order:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow
      POSTGRES_DB: order_db
    volumes:
      - db_order_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodflow -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft — no Zookeeper needed) ──────────────────────────────────────

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Observability ─────────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # ── Services ─────────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://foodflow:foodflow@db-auth:5432/auth_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-change-in-production}
      DEBUG: ${DEBUG:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4317}
    depends_on:
      db-auth:
        condition: service_healthy
    volumes:
      - ./services/auth-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  restaurant-service:
    build:
      context: ./services/restaurant-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://foodflow:foodflow@db-restaurant:5432/restaurant_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-change-in-production}
      DEBUG: ${DEBUG:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4317}
    depends_on:
      db-restaurant:
        condition: service_healthy
    volumes:
      - ./services/restaurant-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

  order-service:
    build:
      context: ./services/order-service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://foodflow:foodflow@db-order:5432/order_db
      SECRET_KEY: ${SECRET_KEY:-supersecretkey-change-in-production}
      RESTAURANT_SERVICE_URL: http://restaurant-service:8002
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DEBUG: ${DEBUG:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4317}
    depends_on:
      db-order:
        condition: service_healthy
      restaurant-service:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - ./services/order-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload

  payment-service:
    build:
      context: ./services/payment-service
    ports:
      - "8004:8004"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4317}
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./services/payment-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload

  notification-service:
    build:
      context: ./services/notification-service
    ports:
      - "8005:8005"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SENTRY_DSN: ${SENTRY_DSN:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-jaeger:4317}
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./services/notification-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8005 --reload

volumes:
  db_auth_data:
  db_restaurant_data:
  db_order_data:
  prometheus_data:
  grafana_data:
